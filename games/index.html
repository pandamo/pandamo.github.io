<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>硬币合并排行榜</title>
    <link rel="stylesheet" href="./home.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <h1>硬币合并小游戏</h1>
        <p>
          挑战更高数字，刷新你的个人最佳。注册后可同步游戏进度，并在全站排行榜争夺前十。
        </p>
      </header>

      <main class="main">
        <section class="card">
          <h2 class="section-title">全站最高纪录 TOP10</h2>
          <div id="leaderboard-status" class="status">正在初始化排行榜...</div>
          <ol id="leaderboard-list" class="rank-list"></ol>
        </section>
      </main>

      <footer class="footer-actions">
        <div id="auth-actions" class="action-bar">
          <a class="button primary" href="./auth.html">注册</a>
          <a class="button secondary" href="./auth.html">登录</a>
        </div>
        <div id="game-action" class="action-bar hidden">
          <a class="button primary" href="./game.html">进入游戏</a>
        </div>
      </footer>
    </div>

    <script type="module" src="./home.js"></script>
  </body>
</html>
